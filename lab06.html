function Quiz({ questions, lang, quizTitle, quizSub }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const done = Object.keys(revealed).length === questions.length;
  const score = Object.entries(answers).filter(([i,a]) => Number(a) === questions[Number(i)].correct).length;
  const handleAnswer = (qi, oi) => {
    if (revealed[qi] !== undefined) return;
    setAnswers(p=>({...p,[qi]:oi}));
    setRevealed(p=>({...p,[qi]:true}));
  };
  return (
    <div className="quiz-section">
      <h3 className="quiz-title">{quizTitle}</h3>
      <p className="quiz-sub">{quizSub}</p>
      <div className="quiz-progress">{Object.keys(revealed).length} / {questions.length} {lang==='de'?'beantwortet':'answered'}</div>
      {questions.map((q,qi)=>(
        <div key={qi} className="question-block">
          <div className="question-num">{lang==='de'?'Frage':'Question'} {qi+1}</div>
          <div className="question-text">{q.q}</div>
          <div className="options">
            {q.options.map((opt,oi)=>{
              let cls="option-btn";
              if(revealed[qi]!==undefined){cls+=" revealed";if(oi===q.correct)cls+=" correct";else if(oi===answers[qi])cls+=" wrong";}
              return <button key={oi} className={cls} onClick={()=>handleAnswer(qi,oi)}><span style={{marginRight:'8px',fontWeight:800}}>{String.fromCharCode(65+oi)}.</span>{opt}</button>;
            })}
          </div>
          {revealed[qi]!==undefined&&<div className={`feedback ${answers[qi]===q.correct?'correct':'wrong'}`}>{answers[qi]===q.correct?(lang==='de'?'✓ Richtig! ':'✓ Correct! '):(lang==='de'?'✗ Nicht ganz. ':'✗ Not quite. ')}{q.explain}</div>}
        </div>
      ))}
      {done&&<div className="quiz-result"><div className="quiz-result-score">{score}/{questions.length}</div><div className="quiz-result-label">{lang==='de'?'Punkte':'Points'}</div><div className="quiz-result-msg">{score>=13?(lang==='de'?'🎉 Ausgezeichnet! Weiter zu Lab 07.':'🎉 Excellent! Continue to Lab 07.'):score>=10?(lang==='de'?'👍 Gut! Lies die Erklärungen nochmal durch.':'👍 Good! Review the explanations.'):(lang==='de'?'💪 Noch einmal! Schau dir die Erklärungen an.':'💪 Try again! Check the explanations.')}</div></div>}
    </div>
  );
}

function FunnelViz({ data, lang }) {
  return (
    <div className="funnel-viz">
      {data.map((row,i)=>(
        <div key={i} className="funnel-row">
          <div className="funnel-stage">{row.stage}</div>
          <div className="funnel-bar-wrap">
            <div className="funnel-bar" style={{width:row.val+'%', background: i===1?'#E87722':'#005B9A'}}>
              <span className="funnel-bar-label">{row.val}%</span>
            </div>
          </div>
          <div className="funnel-pct">{row.pct}</div>
        </div>
      ))}
    </div>
  );
}
