<html lang="de">
<head>
  <meta charset="UTF-8"/>

  <title>Lab 07 – Sentiment-Analyse & Customer Voice · UrbanCart · THWS</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif; background:#fff; color:#212529; }
    .top-bar { height:4px; background:#E87722; position:fixed; top:0; left:0; right:0; z-index:200; }
    .navbar { position:sticky; top:4px; z-index:100; background:#fff; border-bottom:1px solid #E9ECEF; box-shadow:0 1px 8px rgba(0,0,0,0.05); height:52px; display:flex; align-items:center; padding:0 32px; justify-content:space-between; }
    .nav-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .nav-brand-text { font-size:0.78rem; font-weight:700; color:#005B9A; letter-spacing:0.04em; text-transform:uppercase; }
    .nav-lab-badge { background:rgba(232,119,34,0.12); color:#E87722; font-size:0.68rem; font-weight:700; padding:3px 10px; letter-spacing:0.06em; text-transform:uppercase; }
    .lang-wrap { display:flex; gap:4px; }
    .lang-btn { padding:4px 10px; border-radius:3px; border:1.5px solid #E9ECEF; background:#fff; cursor:pointer; font-weight:700; font-size:0.72rem; color:#6C757D; transition:all 0.15s; font-family:inherit; }
    .lang-btn.active { background:#E87722; color:#fff; border-color:#E87722; }
    .progress-bar { background:#F1F3F5; padding:12px 32px; display:flex; align-items:center; gap:8px; overflow-x:auto; }
    .prog-step { display:flex; align-items:center; gap:6px; white-space:nowrap; font-size:0.72rem; font-weight:700; color:#9ca3af; }
    .prog-step.active { color:#E87722; } .prog-step.done { color:#3D7A56; }
    .prog-dot { width:24px; height:24px; border-radius:50%; background:#E9ECEF; display:flex; align-items:center; justify-content:center; font-size:0.68rem; font-weight:800; flex-shrink:0; }
    .prog-dot.active { background:#E87722; color:#fff; } .prog-dot.done { background:#3D7A56; color:#fff; }
    .prog-arrow { color:#D1D5DB; font-size:0.9rem; }
    .lab-hero { background:#005B9A; padding:48px 32px; position:relative; overflow:hidden; }
    .lab-hero-inner { max-width:800px; }
    .lab-num { font-size:0.72rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.5); margin-bottom:8px; }
    .lab-title { font-size:clamp(1.8rem,4vw,2.8rem); font-weight:800; color:#fff; line-height:1.1; margin-bottom:12px; }
    .lab-title span { color:#E87722; }
    .lab-sub { font-size:1rem; color:rgba(255,255,255,0.75); line-height:1.7; max-width:560px; }
    .lab-meta { display:flex; gap:16px; flex-wrap:wrap; margin-top:24px; }
    .lab-meta-item { display:flex; align-items:center; gap:6px; font-size:0.78rem; font-weight:600; color:rgba(255,255,255,0.6); }
    .lab-meta-item strong { color:#fff; }
    .content { max-width:800px; margin:0 auto; padding:48px 32px; }
    .section-block { margin-bottom:48px; }
    .block-eyebrow { font-size:0.68rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:#E87722; margin-bottom:6px; }
    .block-title { font-size:1.3rem; font-weight:800; color:#005B9A; margin-bottom:8px; }
    .block-lead { font-size:0.95rem; color:#6C757D; line-height:1.75; margin-bottom:20px; }
    .divider { width:40px; height:3px; background:#E87722; margin:8px 0 16px; }
    .steps { display:flex; flex-direction:column; gap:16px; }
    .step-card { border:1.5px solid #E9ECEF; padding:20px 24px; border-left:3px solid #005B9A; transition:border-color 0.2s; }
    .step-card:hover { border-left-color:#E87722; }
    .step-header { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .step-num { width:28px; height:28px; border-radius:50%; background:#005B9A; color:#fff; display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:800; flex-shrink:0; }
    .step-title { font-size:0.95rem; font-weight:800; color:#212529; }
    .step-body { font-size:0.87rem; color:#6C757D; line-height:1.7; margin-left:40px; }
    .step-body code { background:#F1F3F5; padding:1px 6px; font-family:'Consolas','Monaco',monospace; font-size:0.82rem; color:#E87722; border-radius:2px; }
    .step-tip { background:rgba(0,91,154,0.06); border-left:2px solid #005B9A; padding:10px 14px; margin-top:10px; margin-left:40px; font-size:0.82rem; color:#005B9A; line-height:1.6; }
    .screenshot-placeholder { background:#F1F3F5; border:1.5px dashed #D1D5DB; padding:32px; text-align:center; margin:16px 0; border-radius:2px; }
    .screenshot-placeholder-text { font-size:0.78rem; color:#9ca3af; font-weight:600; }
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; margin:16px 0; }
    .kpi-card { background:#fff; border:1.5px solid #E9ECEF; border-top:3px solid #E87722; padding:20px 16px; text-align:center; }
    .kpi-val { font-size:1.6rem; font-weight:900; color:#E87722; line-height:1; }
    .kpi-lbl { font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:#005B9A; margin-top:4px; }
    .kpi-def { font-size:0.78rem; color:#9ca3af; margin-top:6px; line-height:1.5; }
    .info-box { background:rgba(0,91,154,0.06); border:1.5px solid rgba(0,91,154,0.15); padding:20px 24px; margin:16px 0; }
    .info-box-title { font-size:0.84rem; font-weight:800; color:#005B9A; margin-bottom:8px; }
    .info-box-text { font-size:0.84rem; color:#374151; line-height:1.7; }
    .concept-card { border:1.5px solid #E9ECEF; padding:20px 24px; border-left:3px solid #E87722; margin-bottom:16px; }
    .concept-title { font-size:0.95rem; font-weight:800; color:#212529; margin-bottom:8px; }
    .concept-body { font-size:0.87rem; color:#6C757D; line-height:1.7; }
    .concept-tip { background:rgba(232,119,34,0.06); border-left:2px solid #E87722; padding:10px 14px; margin-top:10px; font-size:0.82rem; color:#92400e; line-height:1.6; }
    .sentiment-bar { display:flex; gap:4px; height:32px; border-radius:2px; overflow:hidden; margin:16px 0; }
    .sent-pos { background:#3D7A56; display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.72rem; font-weight:700; }
    .sent-neu { background:#9ca3af; display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.72rem; font-weight:700; }
    .sent-neg { background:#ef4444; display:flex; align-items:center; justify-content:center; color:#fff; font-size:0.72rem; font-weight:700; }
    .selbststudium-box { background:rgba(232,119,34,0.06); border:1.5px solid rgba(232,119,34,0.25); padding:24px; margin:24px 0; }
    .selbststudium-title { font-size:0.84rem; font-weight:800; color:#E87722; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.1em; }
    .selbststudium-text { font-size:0.87rem; color:#374151; line-height:1.8; }
    .quiz-section { background:#F1F3F5; padding:40px 32px; margin:0 -32px; border-radius:2px; }
    .quiz-title { font-size:1.1rem; font-weight:800; color:#005B9A; margin-bottom:4px; }
    .quiz-sub { font-size:0.84rem; color:#6C757D; margin-bottom:24px; }
    .quiz-progress { font-size:0.72rem; font-weight:700; color:#9ca3af; margin-bottom:20px; text-transform:uppercase; letter-spacing:0.08em; }
    .question-block { background:#fff; border:1.5px solid #E9ECEF; padding:24px; margin-bottom:16px; }
    .question-num { font-size:0.68rem; font-weight:700; color:#E87722; text-transform:uppercase; letter-spacing:0.1em; margin-bottom:6px; }
    .question-text { font-size:0.95rem; font-weight:700; color:#212529; margin-bottom:16px; line-height:1.5; }
    .options { display:flex; flex-direction:column; gap:8px; }
    .option-btn { background:#F9FAFB; border:1.5px solid #E9ECEF; padding:10px 16px; text-align:left; font-size:0.87rem; font-weight:600; color:#374151; cursor:pointer; transition:all 0.15s; font-family:inherit; }
    .option-btn:hover { border-color:#005B9A; color:#005B9A; background:rgba(0,91,154,0.04); }
    .option-btn.correct { background:rgba(61,122,86,0.1); border-color:#3D7A56; color:#3D7A56; }
    .option-btn.wrong { background:rgba(239,68,68,0.08); border-color:#ef4444; color:#ef4444; }
    .option-btn.revealed { pointer-events:none; }
    .feedback { margin-top:10px; padding:10px 14px; font-size:0.84rem; line-height:1.6; font-weight:600; }
    .feedback.correct { background:rgba(61,122,86,0.1); color:#3D7A56; border-left:2px solid #3D7A56; }
    .feedback.wrong { background:rgba(239,68,68,0.08); color:#dc2626; border-left:2px solid #dc2626; }
    .quiz-result { background:#fff; border:1.5px solid #E9ECEF; border-top:3px solid #E87722; padding:32px; text-align:center; margin-top:16px; }
    .quiz-result-score { font-size:3rem; font-weight:900; color:#E87722; line-height:1; }
    .quiz-result-label { font-size:0.84rem; color:#6C757D; margin-top:6px; }
    .quiz-result-msg { font-size:1rem; font-weight:700; color:#212529; margin-top:16px; }
    .ai-section { background:#0f172a; padding:32px; border-left:3px solid #E87722; margin:32px 0; }
    .ai-eyebrow { font-size:0.68rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:#E87722; margin-bottom:6px; }
    .ai-title { font-size:1.1rem; font-weight:800; color:#fff; margin-bottom:12px; }
    .ai-text { font-size:0.87rem; color:rgba(255,255,255,0.65); line-height:1.75; margin-bottom:16px; }
    .code-block { background:#1e293b; border-left:2px solid #E87722; color:#e2e8f0; font-family:'Consolas','Monaco',monospace; font-size:0.78rem; line-height:1.8; padding:16px 20px; overflow-x:auto; white-space:pre; }
    .lab-nav { border-top:1px solid #E9ECEF; padding:32px; display:flex; justify-content:space-between; align-items:center; max-width:800px; margin:0 auto; }
    .lab-nav-btn { display:flex; align-items:center; gap:8px; font-size:0.87rem; font-weight:700; color:#005B9A; text-decoration:none; cursor:pointer; transition:color 0.15s; }
    .lab-nav-btn:hover { color:#E87722; }
    .lab-nav-btn.primary { background:#E87722; color:#fff; padding:10px 20px; border:2px solid #E87722; }
    .lab-nav-btn.primary:hover { background:#d06a1a; border-color:#d06a1a; }
    .sr { opacity:0; transform:translateY(12px); transition:opacity 0.5s ease,transform 0.5s ease; }
    .sr.visible { opacity:1; transform:translateY(0); }

    selbststudiumText:"Im reviews.csv wurden die Sentimentlabels bereits vorberechnet. Aber wie funktioniert das technisch? Es gibt zwei Ansätze:\n\n1. Rule-based (VADER): VADER (Valence Aware Dictionary and sEntiment Reasoner) nutzt ein Wörterbuch mit vordefinierten Sentiment-Scores. 'Exzellent' = +0.8, 'furchtbar' = -0.9. Schnell, keine Trainingsdaten nötig. Schwäche: Kontext wird nicht verstanden ('nicht schlecht' wird falsch klassifiziert).\n\n2. ML-based (BERT, RoBERTa): Transformer-Modelle verstehen Kontext durch Vortraining auf riesigen Textmengen. Deutlich genauer, aber braucht mehr Rechenleistung. State-of-the-Art für kommerzielle Anwendungen.\n\nFür UrbanCart: VADER-Scores wurden mit einem Schwellenwert (≥0.05 = positiv, ≤-0.05 = negativ) in Labels umgewandelt.",

      {title:"Was ist Aspect-based Sentiment?", body:"Standard-Sentiment sagt: 'Dieser Review ist negativ.' Aspect-based Sentiment sagt: 'Dieser Review ist positiv bezüglich Qualität, aber negativ bezüglich Preis.' Viel detaillierter, erfordert aber spezialisierte NLP-Modelle.", tip:null},

      {q:"Was bedeutet NPS (Net Promoter Score)?",options:["Anzahl der negativen Produktbewertungen","Eine Kennzahl, die misst, wie wahrscheinlich Kunden die Marke weiterempfehlen","Durchschnittliche Sternebewertung","Anzahl der Retouren"],correct:1,explain:"NPS = Net Promoter Score. Frage: 'Wie wahrscheinlich empfehlen Sie uns weiter?' (0-10). Promoters (9-10) minus Detractors (0-6) = NPS. Benchmark: >50 ist gut, >70 ist exzellent."},
      {q:"Wie labelt VADER Texte?",options:["Durch maschinelles Lernen auf Basis von Trainingsdaten","Durch ein Wörterbuch mit vordefinierten Sentiment-Scores für Wörter und Phrasen","Durch manuelle Annotation","Durch Häufigkeitsanalyse"],correct:1,explain:"VADER nutzt ein Lexikon (Wörterbuch): Jedes Wort hat einen Sentiment-Score. Der Text-Score ergibt sich aus der Summe der Wort-Scores, normiert auf [-1, +1]."},
      {q:"Was ist Precision in der Klassifikation?",options:["Anteil richtig erkannter positiver Fälle an allen als positiv klassifizierten","Anteil der korrekt klassifizierten Texte insgesamt","Geschwindigkeit des Klassifikators","Anzahl der Trainingsdaten"],correct:0,explain:"Precision = True Positives / (True Positives + False Positives). Beantwortet: 'Wenn das Modell 'positiv' sagt, wie oft stimmt das?'"},
      {q:"Warum könnte die Schuhe-Kategorie schlechter abschneiden?",options:["Weil Schuhe teurer sind","Weil Größenangaben oft nicht stimmen und Passform schwer online zu beurteilen ist","Weil Schuhe häufiger zurückgegeben werden","Weil Schuhe-Kunden ältere Nutzer sind"],correct:1,explain:"Schuhe sind eine besonders problematische Kategorie im Online-Handel: Größentabellen variieren je nach Hersteller, die Passform ist online nicht prüfbar. Resultat: mehr Retouren und negative Reviews."},
      {q:"Wie auf negative Reviews reagieren?",options:["Ignorieren, da statistisch irrelevant","Innerhalb von 24h öffentlich antworten, Entschuldigung + Lösung anbieten","Löschen lassen","Nur privat kontaktieren"],correct:1,explain:"Best Practice: schnelle, öffentliche, empathische Antwort auf negative Reviews. Zeigt anderen Kunden, dass das Unternehmen Probleme ernst nimmt. Verbessert Vertrauen und Conversion."},
      {q:"Was ist ein Konfidenz-Score bei Sentiment?",options:["Die Genauigkeit des gesamten Modells","Die Wahrscheinlichkeit, mit der das Modell seiner eigenen Klassifikation sicher ist","Der Durchschnittswert aller Reviews","Die Anzahl der analysierten Texte"],correct:1,explain:"Konfidenz-Score: Das Modell sagt nicht nur 'positiv', sondern auch 'mit 87% Sicherheit'. Niedrige Konfidenz (<60%) = unsichere Klassifikation, besser manuell prüfen."},

      {q:"Wie nutzt man Sentiment-Analyse im Marketing?",options:["Nur für Krisenmanagement","Für Produktoptimierung, Messaging, Kampagnen-Timing und Wettbewerbsvergleich","Ausschließlich für den Kundenservice","Nur für Social-Media-Kanäle"],correct:1,explain:"Sentiment-Analyse ermöglicht: positive Aspekte in Werbebotschaften hervorheben, Probleme vor Kampagnen lösen, Wettbewerber-Schwächen als eigene Stärken positionieren."},

function Quiz({ questions, lang, quizTitle, quizSub }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const done = Object.keys(revealed).length === questions.length;
  const score = Object.entries(answers).filter(([i,a]) => Number(a) === questions[Number(i)].correct).length;
  const handleAnswer = (qi, oi) => {
    if (revealed[qi] !== undefined) return;
    setAnswers(p=>({...p,[qi]:oi}));
    setRevealed(p=>({...p,[qi]:true}));
  };
  return (
    <div className="quiz-section">
      <h3 className="quiz-title">{quizTitle}</h3>
      <p className="quiz-sub">{quizSub}</p>
      <div className="quiz-progress">{Object.keys(revealed).length} / {questions.length} {lang==='de'?'beantwortet':'answered'}</div>
      {questions.map((q,qi)=>(
        <div key={qi} className="question-block">
          <div className="question-num">{lang==='de'?'Frage':'Question'} {qi+1}</div>
          <div className="question-text">{q.q}</div>
          <div className="options">
            {q.options.map((opt,oi)=>{
              let cls="option-btn";
              if(revealed[qi]!==undefined){cls+=" revealed";if(oi===q.correct)cls+=" correct";else if(oi===answers[qi])cls+=" wrong";}
              return <button key={oi} className={cls} onClick={()=>handleAnswer(qi,oi)}><span style={{marginRight:'8px',fontWeight:800}}>{String.fromCharCode(65+oi)}.</span>{opt}</button>;
            })}
          </div>
          {revealed[qi]!==undefined&&<div className={`feedback ${answers[qi]===q.correct?'correct':'wrong'}`}>{answers[qi]===q.correct?(lang==='de'?'✓ Richtig! ':'✓ Correct! '):(lang==='de'?'✗ Nicht ganz. ':'✗ Not quite. ')}{q.explain}</div>}
        </div>
      ))}
      {done&&<div className="quiz-result"><div className="quiz-result-score">{score}/{questions.length}</div><div className="quiz-result-label">{lang==='de'?'Punkte':'Points'}</div><div className="quiz-result-msg">{score>=13?(lang==='de'?'🎉 Ausgezeichnet! Weiter zu Lab 08.':'🎉 Excellent! Continue to Lab 08.'):score>=10?(lang==='de'?'👍 Gut! Lies die Erklärungen nochmal durch.':'👍 Good! Review the explanations.'):(lang==='de'?'💪 Noch einmal! Schau dir die Erklärungen an.':'💪 Try again! Check the explanations.')}</div></div>}
    </div>
  );
}
