function Quiz({ questions, t, lang }) {
  const [answers, setAnswers] = useState({});
  const [revealed, setRevealed] = useState({});
  const done = Object.keys(revealed).length === questions.length;
  const score = Object.entries(answers).filter(([i, a]) => a === questions[i].correct).length;
  const handleAnswer = (qi, oi) => {
    if (revealed[qi] !== undefined) return;
    setAnswers(prev => ({ ...prev, [qi]: oi }));
    setRevealed(prev => ({ ...prev, [qi]: true }));
  };
  return (
    <div className="quiz-section">
      <h3 className="quiz-title">{t.quizTitle}</h3>
      <p className="quiz-sub">{t.quizSub}</p>
      <div className="quiz-progress">{Object.keys(revealed).length} / {questions.length} {lang==='de'?'beantwortet':'answered'}</div>
      {questions.map((q, qi) => (
        <div key={qi} className="question-block">
          <div className="question-num">{lang==='de'?'Frage':'Question'} {qi + 1}</div>
          <div className="question-text">{q.q}</div>
          <div className="options">
            {q.options.map((opt, oi) => {
              let cls = "option-btn";
              if (revealed[qi] !== undefined) {
                cls += " revealed";
                if (oi === q.correct) cls += " correct";
                else if (oi === answers[qi]) cls += " wrong";
              }
              return (
                <button key={oi} className={cls} onClick={() => handleAnswer(qi, oi)}>
                  <span style={{marginRight:'8px',fontWeight:800}}>{String.fromCharCode(65+oi)}.</span>{opt}
                </button>
              );
            })}
          </div>
          {revealed[qi] !== undefined && (
            <div className={`feedback ${answers[qi] === q.correct ? 'correct' : 'wrong'}`}>
              {answers[qi] === q.correct ? (lang==='de'?"✓ Richtig! ":"✓ Correct! ") : (lang==='de'?"✗ Nicht ganz. ":"✗ Not quite. ")}
              {q.explain}
            </div>
          )}
        </div>
      ))}
      {done && (
        <div className="quiz-result">
          <div className="quiz-result-score">{score}/{questions.length}</div>
          <div className="quiz-result-label">{lang==='de'?'Punkte':'Points'}</div>
          <div className="quiz-result-msg">
            {score >= 13 ? (lang==='de'?'Ausgezeichnet! Weiter zu Lab 09.':'Excellent! Continue to Lab 09.') :
             score >= 10 ? (lang==='de'?'Gut! Lies die Erklärungen nochmal durch.':'Good! Review the explanations.') :
             (lang==='de'?'Noch einmal! Schau dir die Erklärungen an.':'Try again! Check the explanations.')}
          </div>
        </div>
      )}
    </div>
  );
}

            <span className="nav-brand-text">E-Commerce Labs</span>
          </a>
          <span className="nav-lab-badge">{t.labNum}</span>
        </div>
        <div className="lang-wrap">
          <button className={`lang-btn${lang==='de'?' active':''}`} onClick={()=>setLang('de')}>DE</button>
          <button className={`lang-btn${lang==='en'?' active':''}`} onClick={()=>setLang('en')}>EN</button>
        </div>
      </nav>

      <div className="progress-bar">
        {t.progSteps.map((s, i) => (
          <React.Fragment key={i}>
            <div className={`prog-step ${i < 3 ? 'done' : i === 3 ? 'active' : ''}`}>
              <div className={`prog-dot ${i < 3 ? 'done' : i === 3 ? 'active' : ''}`}>
                {i < 3 ? '✓' : i + 1}
              </div>
              {s}
            </div>
            {i < t.progSteps.length - 1 && <div className="prog-arrow">›</div>}
          </React.Fragment>
        ))}
      </div>

      <div className="lab-hero">
        <div className="lab-hero-inner">
          <div className="lab-num">{t.labNum}</div>
          <h1 className="lab-title">{t.labTitle[0]}<span>{t.labTitle[1]}</span></h1>
          <p className="lab-sub">{t.labSub}</p>
          <div className="lab-meta">
            {[
              [<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>, t.metaDauer],
              [<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>, t.metaLevel],
              [<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>, t.metaData],
              [<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>, t.metaTool]
            ].map(([icon,val],i) => (
              <div key={i} className="lab-meta-item">{icon} <strong>{val}</strong></div>
            ))}
          </div>
        </div>
      </div>

      <div className="content">
        <div className="section-block sr">
          <div className="block-eyebrow">{t.s1eye}</div>
          <h2 className="block-title">{t.s1title}</h2>
          <div className="divider"/>
          <p className="block-lead">{t.s1lead}</p>
          <div className="kpi-grid" style={{marginTop:'20px'}}>
            {[
              {val:"ROAS = Revenue / Spend", lbl:lang==='de'?"Return on Ad Spend":"Return on Ad Spend", def:lang==='de'?"Beispiel: 4.000€ Umsatz / 1.000€ Spend = ROAS 4,0x":"Example: €4,000 revenue / €1,000 spend = ROAS 4.0x"},
              {val:"CPA = Spend / Orders", lbl:lang==='de'?"Cost per Acquisition":"Cost per Acquisition", def:lang==='de'?"Beispiel: 500€ Spend / 20 Käufe = 25€ CPA":"Example: €500 spend / 20 purchases = €25 CPA"},
              {val:">4x", lbl:lang==='de'?"Benchmark ROAS E-Commerce":"Benchmark ROAS E-Commerce", def:lang==='de'?"E-Commerce-Standard: ROAS von 4x gilt als profitabel. Unter 1x = Verlust.":"E-commerce standard: ROAS of 4x is considered profitable. Below 1x = loss."}
            ].map((k,i) => (
              <div key={i} className="kpi-card">
                <div className="kpi-val" style={{fontSize:'0.9rem', fontFamily:'monospace'}}>{k.val}</div>
                <div className="kpi-lbl">{k.lbl}</div>
                <div className="kpi-def">{k.def}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="section-block sr">
          <div className="block-eyebrow">{t.s2eye}</div>
          <h2 className="block-title">{t.s2title}</h2>
          <div className="divider"/>
          <p className="block-lead">{t.s2lead}</p>
          <div className="steps">
            {t.steps.map((step, i) => (
              <div key={i} className="step-card">
                <div className="step-header">
                  <div className="step-num">{i+1}</div>
                  <div className="step-title">{step.title}</div>
                </div>
                <div className="step-body" dangerouslySetInnerHTML={{__html: step.body}}/>
                {step.tip && <div className="step-tip">{step.tip}</div>}
              </div>
            ))}
          </div>
        </div>

        <div className="section-block sr">
          <div className="block-eyebrow">{t.s3eye}</div>
          <h2 className="block-title">{t.s3title}</h2>
          <div className="divider"/>
          <p className="block-lead">{t.s3lead}</p>
          <div className="kpi-grid">
            {t.kpis.map((k,i) => (
              <div key={i} className="kpi-card">
                <div className="kpi-val">{k.val}</div>
                <div className="kpi-lbl">{k.lbl}</div>
                <div className="kpi-def">{k.def}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="section-block sr">
          <Quiz questions={t.questions} t={t} lang={lang}/>
        </div>

        <div className="section-block sr">
          <div className="ai-section">
            <div className="ai-eyebrow">{t.aiEye}</div>
            <h3 className="ai-title">{t.aiTitle}</h3>
            <p className="ai-text">{t.aiText}</p>
            <div className="code-block">{t.aiPrompt}</div>
          </div>
        </div>
      </div>

      <div className="lab-nav">
        <a href="lab07.html" className="lab-nav-btn">
          {t.prevLab}
        </a>
        <a href="lab09.html" className="lab-nav-btn primary">
          {t.nextLab}
        </a>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
